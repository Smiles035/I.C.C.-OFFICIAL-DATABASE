<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal IBM 3151</title>
    <style>
        @import url('https://googleapis.com');

        @keyframes crt-flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        body {
            background-color: #030200; 
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            animation: crt-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 5px, 100% 100%;
        }

        .terminal {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .corner-logo {
            position: absolute;
            top: -20px;
            left: 0;
            max-width: 90px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.85;
            display: none;
        }

        .logo-container {
            display: block;
            margin: 25px auto;
            text-align: center;
        }

        .retro-logo {
            max-width: 260px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.9;
        }

        .retro-btn {
            background: transparent;
            border: 2px solid #ffb000;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            margin: 20px 0;
            display: inline-block;
        }

        .retro-btn:hover {
            background-color: #ffb000;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ffb000;
            padding: 10px;
            text-align: left;
        }

        th { background-color: rgba(255, 176, 0, 0.2); }

        .input-line { display: flex; align-items: center; }

        #terminal-input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            outline: none;
            width: 100%;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ffb000;
            background: rgba(255, 176, 0, 0.03);
            display: none;
        }

        .header-text { margin-left: 120px; }
        
        #intro-screen { display: none; }
        #power-on-screen { display: block; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="terminal">
        <img id="static-logo" src="logo.png" alt="Logo" class="corner-logo">

        <!-- BOTÃO DE ENERGIA INICIAL -->
        <div id="power-on-screen">
            <button id="btn-power" class="retro-btn">[ LIGAR TERMINAL IBM 3151 ]</button>
        </div>

        <!-- INTRODUÇÃO -->
        <div id="intro-screen">
            <p id="boot-1"></p>
            <p id="boot-2"></p>
            <p id="boot-3"></p>
            <div id="logo-area" class="logo-container" style="display: none;">
                <img src="logo.png" alt="Logo" class="retro-logo">
            </div>
        </div>

        <!-- MENU INICIAL -->
        <div id="boot-header" style="display: none;">
            <div class="header-text">
                <p>IBM 3151 ASCII DISPLAY STATION — V1.0</p>
                <p>SISTEMA OPERATIVO RETRO CARREGADO COM SUCESSO.</p>
                <hr style="border: 1px dashed #ffb000;">
                <button id="btn-access" class="retro-btn">[ ACEDER AO DIRETÓRIO PRINCIPAL ]</button>
            </div>
        </div>

        <!-- PAINEL PRINCIPAL -->
        <div id="main-content" style="display: none;">
            <div class="header-text">
                <p>[ DIRETÓRIO SECRETO I.C.C. ]</p>
                <p>Aviso: Os IDs de ficheiros confidenciais estão ocultos do índice.</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME DO FICHEIRO</th>
                        <th>ESTADO DE ACESSO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>ajuda</td><td>ajuda.sys</td><td>PÚBLICO</td></tr>
                    <tr><td>limpar</td><td>limpar.sys</td><td>PÚBLICO</td></tr>
                </tbody>
            </table>

            <div id="output-box"></div>
            <br>
            <div class="input-line">
                <span>COMANDO:> &nbsp;</span>
                <input type="text" id="terminal-input" autocomplete="off" placeholder="Insira credencial...">
            </div>
            <br>
            <button id="btn-back" class="retro-btn">[ VOLTAR AO INÍCIO ]</button>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) { console.log("Áudio bloqueado"); }
            }
        }

        function playKeySound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(130, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch(e) {}
        }

        function playBeepSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(700, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            if (!element) return;
            element.innerHTML = "";
            
            function type() {
                if (i < text.length) {
                    if (text.charAt(i) !== ' ') playKeySound();
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // Configuração dos botões
        document.getElementById('btn-power').addEventListener('click', () => {
            document.getElementById('power-on-screen').style.display = "none";
            document.getElementById('intro-screen').style.display = "block";
            
            initAudio();
            playBeepSound();

            typeWriter("boot-1", "IBM BIOS CORE v0.87 - CORP 1987.", 25, () => {
                typeWriter("boot-2", "SYSTEM RAM: 640KB OK (SECURE CHANNEL ACTIVATED)", 15, () => {
                    playBeepSound();
                    document.getElementById('boot-3').innerHTML = "CONNECTING TO I.C.C. CODES CORE...";
                    document.getElementById('logo-area').style.display = "block";
                    
                    setTimeout(() => {
                        document.getElementById('intro-screen').style.display = "none";
                        document.getElementById('boot-header').style.display = "block";
                        document.getElementById('static-logo').style.display = "block";
                        playBeepSound();
                    }, 2000);
                });
            });
        });

        document.getElementById('btn-access').addEventListener('click', () => {
            initAudio();
            playBeepSound();
            document.getElementById('boot-header').style.display = "none";
            document.getElementById('main-content').style.display = "block";
            document.getElementById('output-box').style.display = "none";
            document.getElementById('terminal-input').focus();
        });
document.getElementById('btn-back').addEventListener('click', () => {playBeepSound();document.getElementById('main-content').style.display = "none";document.getElementById('boot-header').style.display = "block";});const ficheiros = {"01": "FICHEIRO CONFIDENCIAL: sobre_mim.txt------------------------------------AUTOR DO SISTEMA: smiles035.ESTADO: ADMINISTRADOR DE SISTEMAS DA I.C.C.","02": "FICHEIRO CONFIDENCIAL: notas.txt--------------------------------SISTEMA CRIPTOGRAFADO DE ALTA SEGURANÇA. TODOS OS ACESSOS FORAM REGISTADOS.","ajuda": "SISTEMA DE AJUDA PROTOCOLO IBM------------------------------Insira um ID confidencial numérico no comando para decifrar os ficheiros ocultos.Digite '01' ou '02' na linha de comandos.Digite 'limpar' para fechar o leitor de dados."};const input = document.getElementById('terminal-input');const outputBox = document.getElementById('output-box');input.addEventListener('keydown', function(e) {initAudio();if (e.key === 'Enter') {playBeepSound();const comando = input.value.trim().toLowerCase();if (comando === 'menu') {document.getElementById('btn-back').click();} else if (ficheiros[comando]) {outputBox.innerHTML = ficheiros[comando];outputBox.style.display = 'block';} else if (comando === 'limpar') {outputBox.style.display = 'none';} else if (comando !== "") {outputBox.innerHTML = "ACESSO NEGADO: Credencial '" + comando + "' inválida ou inexistente.";outputBox.style.display = 'block';}input.value = '';} else if (e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt') {playKeySound();}});document.addEventListener('click', () => {const mainContent = document.getElementById('main-content');if (mainContent && mainContent.style.display === 'block') {input.focus();}});
