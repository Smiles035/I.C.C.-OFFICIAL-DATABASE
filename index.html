<script>
    // Web Audio API Synth for Retro Sound Effects
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playTerminalSound(type) {
        initAudio();
        if (!audioCtx || audioCtx.state === 'suspended') return;

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'click') {
            // Short, mechanical keyboard click
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(600, now);
            gainNode.gain.setValueAtTime(0.02, now);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.03);
            oscillator.start(now);
            oscillator.stop(now + 0.03);
        } else if (type === 'enter') {
            // Slightly deeper return key chime
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(400, now);
            gainNode.gain.setValueAtTime(0.03, now);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.08);
            oscillator.start(now);
            oscillator.stop(now + 0.08);
        } else if (type === 'error') {
            // A low, gritty retro error buzz
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(120, now);
            oscillator.frequency.linearRampToValueAtTime(90, now + 0.25);
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, now + 0.25);
            oscillator.start(now);
            oscillator.stop(now + 0.25);
        }
    }

    // --- Original Terminal Logic with Sound Hooks ---

    function typeWriter(id, text, speed, cb) {
        let i = 0; const el = document.getElementById(id); if (!el) return; el.innerHTML = "";
        function type() { 
            if (i < text.length) { 
                el.innerHTML += text.charAt(i); 
                i++; 
                // Optional: Play a tiny click for typewriter effect, filtered down
                if (i % 3 === 0) playTerminalSound('click'); 
                setTimeout(type, speed); 
            } else if (cb) cb(); 
        }
        type();
    }

    const inputEl = document.getElementById('terminal-input');
    const wrapperEl = document.querySelector('.input-wrapper');
    
    function updateCursor() { 
        if (inputEl && wrapperEl) wrapperEl.style.setProperty('--cursor-pos', `${110 + (inputEl.value.length * 13.2)}px`); 
    }
    
    if (inputEl) {
        inputEl.addEventListener('input', () => {
            updateCursor();
            playTerminalSound('click'); // Click on every keystroke
        });
    }
    
    function startTerminalBoot() {
        document.getElementById('main-content').style.display = "none"; 
        document.getElementById('boot-header').style.display = "none"; 
        document.getElementById('static-logo').style.display = "none"; 
        document.getElementById('file-content-screen').style.display = "none"; 
        document.getElementById('intro-screen').style.display = "block"; 
        document.getElementById('logo-area').style.display = "none"; 
        document.getElementById('boot-2').innerHTML = ""; 
        document.getElementById('boot-3').innerHTML = "";
        
        const bootText = "O.V.I.S. CORES v7.4.18 - I.C.C. 1955.\n> Initializing Core Processes... [OK]\n> Connecting to Habitat-07 Systems... [OK]\n> Power Grid Status........ONLINE\n> Atmospheric Systems......ONLINE\n> Security Network.........ONLINE\n> Medical Network..........ONLINE\n> Communications...........ONLINE\n> Scanning Personnel Registry... 2,814 Residents Located\n> Scanning Surface Sensors... Environmental Conditions: UNSAFE\n> Monitoring Active Threats... NO CONFIRMED THREATS\n> Directive 47-A Database... ACCESS RESTRICTED\n> Administrator Link... CONNECTED\nclass OVIS { bool habitatOnline = true; bool securityOnline = true; };";

        typeWriter("boot-1", bootText, 10, () => {
            typeWriter("boot-2", "SYSTEM RAM: 640KB OK (SECURE CHANNEL ACTIVATED)", 10, () => {
                document.getElementById('boot-3').innerHTML = "CONNECTING TO I.C.C. CODES CORE... ESTABLISHED."; 
                document.getElementById('logo-area').style.display = "block";
                setTimeout(() => { 
                    document.getElementById('intro-screen').style.display = "none"; 
                    document.getElementById('boot-header').style.display = "block"; 
                    document.getElementById('static-logo').style.display = "block"; 
                }, 2000);
            });
        });
    }
    
    window.addEventListener('DOMContentLoaded', startTerminalBoot);
    
    // Unlock audio context on first interactive button click
    document.getElementById('btn-access').addEventListener('click', () => { 
        initAudio();
        playTerminalSound('enter');
        document.getElementById('boot-header').style.display = "none"; 
        document.getElementById('main-content').style.display = "block"; 
        document.getElementById('output-box').style.display = "none"; 
        if (inputEl) { inputEl.focus(); updateCursor(); } 
    });
    
    document.getElementById('btn-back').addEventListener('click', () => { 
        playTerminalSound('click');
        document.getElementById('main-content').style.display = "none"; 
        document.getElementById('boot-header').style.display = "block"; 
        if (inputEl) inputEl.value = ""; 
    });
    
    document.getElementById('btn-close-file').addEventListener('click', () => { 
        playTerminalSound('click');
        document.getElementById('file-content-screen').style.display = "none"; 
        document.getElementById('main-content').style.display = "block"; 
        if (inputEl) { inputEl.focus(); updateCursor(); } 
    });
    
    function carregarFicheiro(nomeFicheiro) {
        fetch(nomeFicheiro)
            .then(response => { if (!response.ok) throw new Error(); return response.text(); })
            .then(texto => { 
                playTerminalSound('enter');
                document.getElementById('main-content').style.display = "none"; 
                document.getElementById('file-content-screen').style.display = "block"; 
                document.getElementById('file-text-area').textContent = texto; 
            })
            .catch(() => { 
                playTerminalSound('error'); // Play failure sound
                const out = document.getElementById('output-box'); 
                out.style.display = "block"; 
                out.innerHTML = `CRITICAL ERROR: Failed to read file '${nomeFicheiro}' from server.`; 
            });
    }

    if (inputEl) {
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.trim().toLowerCase(); 
                const out = document.getElementById('output-box'); 
                out.style.display = "none";
                
                if (cmd === 'help') { carregarFicheiro('help.txt'); } 
                else if (cmd === 'clear') { playTerminalSound('enter'); out.innerHTML = ""; } 
                else if (cmd === 'icc-exec-001') { carregarFicheiro('icc-exec-001.txt'); }
                else if (cmd === 'icc-swarm-001') { carregarFicheiro('icc-swarm-001.txt'); }
                else if (cmd !== "") { 
                    playTerminalSound('error'); // Wrong command sound
                    out.style.display = "block"; 
                    out.innerHTML = `ERROR: Command '${cmd}' not recognized.`; 
                }
                inputEl.value = ""; updateCursor();
            }
        });
    }
</script>
