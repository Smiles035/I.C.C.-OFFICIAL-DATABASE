<script>
        let currentMode = "COMMAND"; 
        let pendingFile = "";
        let idleTimer = null;
        let typewriterTimeout = null; 

        // --- Audio System Setup ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTerminalSound(type) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.03);
                osc.start(now); osc.stop(now + 0.03);
            } else if (type === 'enter') {
                osc.type = 'square'; osc.frequency.setValueAtTime(450, now);
                gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.25);
                gain.gain.setValueAtTime(0.06, now); gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            }
        }

        // --- Adaptive Smart HAL 9000 Engine Matrix ---
        function speakLikeHAL(phrase) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(phrase);
                const voices = window.speechSynthesis.getVoices();
                
                // 1. Scan for premium desktop male engines
                let halVoice = voices.find(v => 
                    v.name.toLowerCase().includes('microsoft david') || 
                    v.name.toLowerCase().includes('david') ||
                    v.name.toLowerCase().includes('google us english male') ||
                    v.name.toLowerCase().includes('chrome male')
                );
                
                // 2. Scan for generic/alternative male profiles
                if (!halVoice) {
                    halVoice = voices.find(v => v.name.toLowerCase().includes('male'));
                }
                
                // 3. Fallback: If no male voice exists, filter out known distorted profiles
                if (!halVoice) {
                    halVoice = voices.find(v => v.lang.startsWith('en'));
                }

                let isFemaleFallback = false;
                if (halVoice) {
                    utterance.voice = halVoice;
                    // Check if the selected voice is explicitly a known female profile
                    const name = halVoice.name.toLowerCase();
                    if (name.includes('zira') || name.includes('hazel') || name.includes('female') || name.includes('google us english female')) {
                        isFemaleFallback = true;
                    }
                }

                // Dynamic Pitch Allocation Matrix
                if (isFemaleFallback) {
                    // Prevent the "weird/alien" distortion by keeping the pitch normal if the OS forces a female voice
                    utterance.pitch = 1.0; 
                    utterance.rate = 0.85;  
                } else {
                    // Apply HAL's signature smooth baritone settings if a true male voice is found
                    utterance.pitch = 0.65; 
                    utterance.rate = 0.72;  
                }
                
                utterance.volume = 1.0; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Generalized Typewriter Engine ---
        function runTypewriter(elementOrId, text, speed, cb) {
            if (typewriterTimeout) clearTimeout(typewriterTimeout);
            
            let el = typeof elementOrId === "string" ? document.getElementById(elementOrId) : elementOrId;
            if (!el) return;
            
            let i = 0;
            el.textContent = "";
            
            function type() { 
                if (i < text.length) { 
                    el.textContent += text.charAt(i); 
                    i++; 
                    if (i % 3 === 0) playTerminalSound('click');
                    typewriterTimeout = setTimeout(type, speed); 
                } else {
                    typewriterTimeout = null;
                    if (cb) cb(); 
                }
            }
            type();
        }

        // --- Real-Time Clock System ---
        function runClock() {
            setInterval(() => {
                const clockEl = document.getElementById('live-clock');
                if (clockEl) {
                    const t = new Date();
                    clockEl.innerText = `TIME: ${t.toTimeString().split(' ')[0]}`;
                }
            }, 1000);
        }

        // --- Matrices Screensaver ---
        const canvas = document.getElementById('screensaver');
        const ctx = canvas.getContext('2d');
        let columns = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Array(Math.floor(canvas.width / 20)).fill(0);
        }
        window.addEventListener('resize', resizeCanvas);

        function drawScreensaver() {
            ctx.fillStyle = 'rgba(3, 2, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffb000';
            ctx.font = '20px monospace';

            columns.forEach((y, index) => {
                const text = String.fromCharCode(33 + Math.random() * 93);
                const x = index * 20;
                ctx.fillText(text, x, y);
                if (y > 100 + Math.random() * 10000) columns[index] = 0;
                else columns[index] = y + 20;
            });
        }

        let screensaverInterval = null;
        function resetIdleTimer() {
            if (canvas.style.display === "block") {
                canvas.style.display = "none";
                clearInterval(screensaverInterval);
                playTerminalSound('enter');
            }
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                canvas.style.display = "block";
                resizeCanvas();
                screensaverInterval = setInterval(drawScreensaver, 40);
            }, 30000);
        }
        window.addEventListener('mousemove', resetIdleTimer);
        window.addEventListener('keydown', resetIdleTimer);

        function triggerDecryptionSequence(fileContent) {
            const mainContent = document.getElementById('main-content');
            const fileScreen = document.getElementById('file-content-screen');
            const fileTextArea = document.getElementById('file-text-area');

            mainContent.style.display = "none";
            fileScreen.style.display = "block";
            
            let percent = 0;
            const interval = setInterval(() => {
                percent += 5;
                let barCount = Math.floor(percent / 5);
                let blocks = "█".repeat(barCount) + "░".repeat(20 - barCount);
                
                fileTextArea.textContent = `DECRYPTING STREAM SECURE CORE DATA...\n\n`;
                fileTextArea.textContent += `PROGRESS: [${blocks}] ${percent}%\n\n`;
                fileTextArea.textContent += `STATUS: BYPASSING PROTOCOL LOCK 47-A...\n`;
                
                if (percent % 20 === 0) playTerminalSound('click');

                if (percent >= 100) {
                    clearInterval(interval);
                    playTerminalSound('enter');
                    runTypewriter(fileTextArea, fileContent, 5);
                }
            }, 60);
        }

        const inputEl = document.getElementById('terminal-input');
        const wrapperEl = document.querySelector('.input-wrapper');
        const promptLabel = document.getElementById('prompt-label');

        function updateCursor() { 
            if (inputEl && wrapperEl) {
                let textLength = inputEl.value.length;
                let offset = promptLabel.offsetWidth + (textLength * 13.2) + 5;
                wrapperEl.style.setProperty('--cursor-pos', `${offset}px`); 
            }
        }
        
        if (inputEl) {
            inputEl.addEventListener('input', () => { updateCursor(); playTerminalSound('click'); });
        }

        // --- Login Page Input Engine ---
        const loginInput = document.getElementById('login-input');
        const loginBoxContainer = document.getElementById('login-box-container');
        const loginErrorMsg = document.getElementById('login-error-msg');

        function updateLoginCursor() {
            if (loginInput && loginBoxContainer) {
                let textLength = loginInput.value.length;
                let offset = 135 + (textLength * 14.3);
                loginBoxContainer.style.setProperty('--login-cursor-pos', `${offset}px`);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if(loginInput) loginInput.focus();
        });
        document.addEventListener('click', () => {
            if(document.getElementById('power-on-screen').style.display !== "none" && loginInput) {
                loginInput.focus();
            }
        });

        if (loginInput) {
            loginInput.addEventListener('input', () => {
                updateLoginCursor();
                playTerminalSound('click');
            });

            loginInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    initAudio(); 
                    const val = loginInput.value.trim().toLowerCase();
                    
                    if (val === 'guest') {
                        loginErrorMsg.textContent = "";
                        document.getElementById('power-on-screen').style.display = "none";
                        playTerminalSound('enter');
                        startTerminalBoot();
                    } else {
                        playTerminalSound('error');
                        loginErrorMsg.textContent = "CRITICAL ERROR: ACCESS DENIED. IDENTITY UNRECOGNIZED.";
                        loginInput.value = "";
                        updateLoginCursor();
                    }
                }
            });
        }
        
        function startTerminalBoot() {
            runClock();
            resetIdleTimer();
            if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
            
            document.getElementById('intro-screen').style.display = "block";
            
            const bootText = "O.V.I.S. CORES v7.4.18 - I.C.C. 1955.\n> Initializing Core Processes... [OK]\n> Connecting to Habitat-07 Systems... [OK]\n> Power Grid Status........ONLINE\n> Atmospheric Systems......ONLINE\n> Security Network.........ONLINE\n> Medical Network..........ONLINE\n> Communications...........ONLINE\n> Scanning Personnel Registry... 2,814 Residents Located\n> Scanning Surface Sensors... Environmental Conditions: UNSAFE\n> Monitoring Active Threats... NO CONFIRMED THREATS\n> Directive 47-A Database... ACCESS RESTRICTED\n> Administrator Link... CONNECTED\nclass OVIS { bool habitatOnline = true; bool securityOnline = true; };";

            runTypewriter("boot-1", bootText, 6, () => {
                runTypewriter("boot-2", "SYSTEM RAM: 640KB OK (SECURE CHANNEL ACTIVATED)", 6, () => {
                    document.getElementById('boot-3').innerHTML = "CONNECTING TO I.C.C. CODES CORE... ESTABLISHED."; document.getElementById('logo-area').style.display = "block";
                    setTimeout(() => { document.getElementById('intro-screen').style.display = "none"; document.getElementById('boot-header').style.display = "block"; document.getElementById('static-logo').style.display = "block"; }, 1500);
                });
            });
        }
        
        document.getElementById('btn-access').addEventListener('click', () => { playTerminalSound('enter'); document.getElementById('boot-header').style.display = "none"; document.getElementById('main-content').style.display = "block"; document.getElementById('output-box').style.display = "none"; if (inputEl) { inputEl.focus(); updateCursor(); } });
        document.getElementById('btn-back').addEventListener('click', () => { playTerminalSound('click'); document.getElementById('main-content').style.display = "none"; document.getElementById('boot-header').style.display = "block"; if (inputEl) { inputEl.value = ""; currentMode = "COMMAND"; promptLabel.textContent = "COMMAND:> "; updateCursor(); } });
        document.getElementById('btn-close-file').addEventListener('click', () => { playTerminalSound('click'); if(typewriterTimeout) clearTimeout(typewriterTimeout); document.getElementById('file-content-screen').style.display = "none"; document.getElementById('main-content').style.display = "block"; if (inputEl) { inputEl.focus(); updateCursor(); } });
        
        function carregarFicheiro(nomeFicheiro) {
            fetch(nomeFicheiro)
                .then(response => { if (!response.ok) throw new Error(); return response.text(); })
                .then(texto => { 
                    triggerDecryptionSequence(texto); 
                })
                .catch(() => { 
                    const out = document.getElementById('output-box'); 
                    playTerminalSound('error'); 
                    out.style.display = "block"; 
                    runTypewriter(out, `CRITICAL ERROR: Failed to read file '${nomeFicheiro}' from server.`, 8);
                });
        }

        if (inputEl) {
            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const rawInput = inputEl.value.trim();
                    const cmd = rawInput.toLowerCase();
                    const out = document.getElementById('output-box'); 
                    out.style.display = "none";
                    
                    if (currentMode === "COMMAND") {
                        if (cmd === 'help') { carregarFicheiro('help.txt'); } 
                        else if (cmd === 'clear') { playTerminalSound('enter'); out.innerHTML = ""; } 
                        else if (
                            cmd === 'hi' || cmd === 'hey' || cmd === 'hello' || cmd.includes('say hello') ||
                            cmd === 'yo' || cmd === 'sup' || cmd === 'greetings' || cmd === 'howdy' ||
                            cmd === 'salutations' || cmd === 'oi' || cmd === 'ola' || cmd === 'hola' ||
                            cmd === 'good morning' || cmd === 'good afternoon' || cmd === 'good evening' ||
                            cmd.includes('whats up') || cmd.includes('what up') || cmd === 'hi there' ||
                            cmd === 'hello there'
                        ) {
                            speakLikeHAL("Good morning, operator. Everything is running smoothly.");
                            
                            out.style.display = "block";
                            runTypewriter(out, "\n[HELLO WORLD]\nTERMINAL STATUS: ACTIVE\nGOOD MORNING, OPERATOR. EVERYTHING IS RUNNING SMOOTHLY.", 6);
                        }
                        else if (cmd === 'icc-exec-001' || cmd === 'icc-swarm-001') {
                            playTerminalSound('error');
                            pendingFile = cmd + ".txt"; 
                            currentMode = "PASSWORD";
                            promptLabel.textContent = "ENTER 4-DIGIT PIN:> ";
                            out.style.display = "block";
                            runTypewriter(out, "WARNING: ENCRYPTED PROFILE DETECTED. AUTHORIZATION CODE REQUIRED.", 8);
                        }
                        else if (cmd !== "") { 
                            playTerminalSound('error'); 
                            out.style.display = "block"; 
                            runTypewriter(out, `ERROR: Command '${cmd}' not recognized.`, 8); 
                        }
                    } 
                    else if (currentMode === "PASSWORD") {
                        if (cmd === "1955") {
                            playTerminalSound('enter');
                            currentMode = "COMMAND";
                            promptLabel.textContent = "COMMAND:> ";
                            carregarFicheiro(pendingFile); 
                        } else {
                            playTerminalSound('error');
                            currentMode = "COMMAND";
                            promptLabel.textContent = "COMMAND:> ";
                            out.style.display = "block";
                            runTypewriter(out, "I am sorry, operator. I'm afraid I can't do that. Invalid access key.", 8);
                            speakLikeHAL("I am sorry, operator. I am afraid I can't do that.");
                        }
                    }
                    inputEl.value = ""; updateCursor();
                }
            });
        }
    </script>
