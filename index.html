<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal IBM 3151</title>
    <style>
        /* CORREÇÃO: Import correto da fonte VT323 */
        @import url('https://googleapis.com');

        @keyframes crt-flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        /* ANIMAÇÃO: Cursor a piscar */
        @keyframes blink {
            50% { border-color: transparent; }
        }

        body {
            background-color: #030200; 
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            animation: crt-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 5px, 100% 100%;
        }

        .terminal {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .corner-logo {
            position: absolute;
            top: -20px;
            left: 0;
            max-width: 90px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.85;
            display: none;
        }

        .logo-container {
            display: block;
            margin: 25px auto;
            text-align: center;
        }

        .retro-logo {
            max-width: 260px;
            height: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.5) sepia(1) saturate(12) hue-rotate(5deg);
            opacity: 0.9;
        }

        .retro-btn {
            background: transparent;
            border: 2px solid #ffb000;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            margin: 20px 0;
            display: inline-block;
        }

        .retro-btn:hover {
            background-color: #ffb000;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ffb000;
            padding: 10px;
            text-align: left;
        }

        th { background-color: rgba(255, 176, 0, 0.2); }

        /* DESIGN: Ajuste para simular o cursor real do terminal */
        .input-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #terminal-input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            outline: none;
            width: 100%;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            caret-color: transparent; /* Esconde o cursor nativo do browser */
        }

        /* CURSOR RETRO: Bloco sólido a piscar a seguir ao texto */
        .input-wrapper::after {
            content: "";
            position: absolute;
            left: var(--cursor-pos, 0px); /* Atualizado dinamicamente via JS */
            width: 12px;
            height: 24px;
            background: #ffb000;
            animation: blink 0.8s infinite;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            display: inline-block;
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ffb000;
            background: rgba(255, 176, 0, 0.03);
            display: none;
        }

        .header-text { margin-left: 0px; } /* Ajustado para melhor alinhamento */
        
        #intro-screen { display: none; }
        #power-on-screen { display: block; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="terminal">
        <img id="static-logo" src="logo.png" alt="Logo" class="corner-logo">

        <!-- BOTÃO DE ENERGIA INICIAL -->
        <div id="power-on-screen">
            <button id="btn-power" class="retro-btn">[ LIGAR TERMINAL IBM 3151 ]</button>
        </div>

        <!-- INTRODUÇÃO -->
        <div id="intro-screen">
            <p id="boot-1"></p>
            <p id="boot-2"></p>
            <p id="boot-3"></p>
            <div id="logo-area" class="logo-container" style="display: none;">
                <img src="logo.png" alt="Logo" class="retro-logo">
            </div>
        </div>

        <!-- MENU INICIAL -->
        <div id="boot-header" style="display: none;">
            <div class="header-text">
                <p>IBM 3151 ASCII DISPLAY STATION — V1.0</p>
                <p>SISTEMA OPERATIVO RETRO CARREGADO COM SUCESSO.</p>
                <hr style="border: 1px dashed #ffb000;">
                <button id="btn-access" class="retro-btn">[ ACEDER AO DIRETÓRIO PRINCIPAL ]</button>
            </div>
        </div>

        <!-- PAINEL PRINCIPAL -->
        <div id="main-content" style="display: none;">
            <div class="header-text">
                <p>[ DIRETÓRIO SECRETO I.C.C. ]</p>
                <p>Aviso: Os IDs de ficheiros confidenciais estão ocultos do índice.</p>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME DO FICHEIRO</th>
                        <th>ESTADO DE ACESSO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>ajuda</td><td>ajuda.sys</td><td>PÚBLICO</td></tr>
                    <tr><td>limpar</td><td>limpar.sys</td><td>PÚBLICO</td></tr>
                </tbody>
            </table>

            <div id="output-box"></div>
            <br>
            <div class="input-wrapper">
                <span>COMANDO:> &nbsp;</span>
                <input type="text" id="terminal-input" autocomplete="off" placeholder="">
            </div>
            <br>
            <button id="btn-back" class="retro-btn">[ VOLTAR AO INÍCIO ]</button>
        </div>
    </div>

    <script>
        // Animação Typewriter
        function typeWriter(elementId, text, speed, callback) {
            let i = 0;
            const element = document.getElementById(elementId);
            if (!element) return;
            element.innerHTML = "";
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        // Lógica do Cursor Retro Dinâmico
        const inputEl = document.getElementById('terminal-input');
        const wrapperEl = document.querySelector('.input-wrapper');
        
        function updateCursorPosition() {
            // Calcula de forma simples a posição do bloco do cursor baseado nos caracteres digitados
            const textLength = inputEl.value.length;
            const offset = 110 + (textLength * 13.2); // Valores aproximados para a fonte VT323
            wrapperEl.style.setProperty('--cursor-pos', `${offset}px`);
        }
        
        inputEl.addEventListener('input', updateCursorPosition);

        // Evento de Clique: Ligar o Terminal
        document.getElementById('btn-power').addEventListener('click', () => {
            document.getElementById('power-on-screen').style.display = "none";
            document.getElementById('intro-screen').style.display = "block";

            typeWriter("boot-1", "IBM BIOS CORE v0.87 - CORP 1987.", 20, () => {
                typeWriter("boot-2", "SYSTEM RAM: 640KB OK (SECURE CHANNEL ACTIVATED)", 10, () => {
                    document.getElementById('boot-3').innerHTML = "CONNECTING TO I.C.C. CODES CORE... ESTABLISHED.";
                    document.getElementById('logo-area').style.display = "block";
                    
                    setTimeout(() => {
                        document.getElementById('intro-screen').style.display = "none";
                        document.getElementById('boot-header').style.display = "block";
                        document.getElementById('static-logo').style.display = "block";
                    }, 2000);
                });
            });
        });

        // Evento de Clique: Aceder ao Diretório
        document.getElementById('btn-access').addEventListener('click', () => {
            document.getElementById('boot-header').style.display = "none";
            document.getElementById('main-content').style.display = "block";
            document.getElementById('output-box').style.display = "none";
            inputEl.focus();
            updateCursorPosition();
        });

        // CORREÇÃO: Conclusão do botão Voltar
        document.getElementById('btn-back').addEventListener('click', () => {
            document.getElementById('main-content').style.display = "none";
            document.getElementById('static-logo').style.display = "none";
            document.getElementById('power-on-screen').style.display = "block";
