<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal IBM 3151</title>
    <style>
        @import url('https://googleapis.com');

        @keyframes crt-flicker {
            0% { opacity: 0.985; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        body {
            background-color: #030200; 
            color: #ffb000; /* Âmbar IBM Clássico */
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            animation: crt-flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.45) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 5px, 100% 100%;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            z-index: 9;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255, 176, 0, 0.04) 0%, rgba(0,0,0,0) 70%);
        }

        .terminal {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .retro-btn {
            background: transparent;
            border: 2px solid #ffb000;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 26px;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
            box-shadow: 0 0 4px rgba(255, 176, 0, 0.3);
            margin: 20px 0;
            display: inline-block;
        }

        .retro-btn:hover {
            background-color: #ffb000;
            color: #000;
            text-shadow: none;
        }

        #main-content {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ffb000;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: rgba(255, 176, 0, 0.2);
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #terminal-input {
            background: transparent;
            border: none;
            color: #ffb000;
            font-family: 'VT323', monospace;
            font-size: 24px;
            outline: none;
            width: 100%;
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
        }

        #output-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ffb000;
            background: rgba(255, 176, 0, 0.03);
            display: none;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <p>IBM 3151 ASCII DISPLAY STATION — V1.0</p>
        <p>SISTEMA OPERATIVO RETRO CARREGADO COM SUCESSO.</p>
        <hr style="border: 1px dashed #ffb000;">
        
        <!-- Botão Inicial -->
        <button id="index-button" class="retro-btn" onclick="revealDirectory()">[ ACEDER AO DIRETÓRIO PRINCIPAL ]</button>

        <!-- Conteúdo Oculto -->
        <div id="main-content">
            <p id="directory-title"></p>
            <p id="directory-subtitle"></p>

            <table id="directory-table" style="display:none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME DO FICHEIRO</th>
                        <th>DESCRIÇÃO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>01</td>
                        <td>sobre_mim.txt</td>
                        <td>Informações sobre o autor do sistema.</td>
                    </tr>
                    <tr>
                        <td>02</td>
                        <td>notas.txt</td>
                        <td>Notas e atualizações do servidor.</td>
                    </tr>
                    <tr>
                        <td>ajuda</td>
                        <td>ajuda.sys</td>
                        <td>Mostra instruções de comandos.</td>
                    </tr>
                </tbody>
            </table>

            <div id="output-box"></div>
            <br>

            <div class="input-line" id="cmd-line" style="display:none;">
                <span>COMANDO:> &nbsp;</span>
                <input type="text" id="terminal-input" placeholder="Digite o ID e pressione Enter..." autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function playKeySound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch(e) {}
        }

        function playBeepSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(750, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {}
        }

        function typeWriterEffect(element, text, speed, callback) {
            let i = 0;
            element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    if (text.charAt(i) !== ' ') playKeySound();
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        function typeWriterHTML(element, htmlText, speed) {
            let i = 0;
            element.innerHTML = "";
            element.style.display = 'block';
            
            let regex = /(<[^>]*>|[^<]*)/g;
            let parts = htmlText.match(regex).filter(Boolean);
            let partIndex = 0;
            let charIndex = 0;

            function typeHTML() {
                if (partIndex < parts.length) {
                    let currentPart = parts[partIndex];
                    if (currentPart.startsWith('<')) {
                        element.innerHTML += currentPart;
                        partIndex++;
                        setTimeout(typeHTML, 0);
                    } else {
                        if (charIndex < currentPart.length) {
                            if (currentPart.charAt(charIndex) !== ' ') playKeySound();
                            element.innerHTML += currentPart.charAt(charIndex);
                            charIndex++;
                            setTimeout(typeHTML, speed);
                        } else {
                            charIndex = 0;
                            partIndex++;
                            setTimeout(typeHTML, 0);
                        }
                    }
                }
            }
            typeHTML();
        }

        // FUNÇÃO DE REVELAÇÃO CORRIGIDA (À prova de erros)
        function revealDirectory() {
            // Tenta iniciar o som sem bloquear o clique se falhar
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                playBeepSound();
            } catch (e) {
                console.log("Áudio bloqueado pelo browser");
            }

            // Mostra a secção principal imediatamente
            document.getElementById('index-button').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            const titleEl = document.getElementById('directory-title');
            const subtitleEl = document.getElementById('directory-subtitle');
            
            // Inicia a animação de escrita de forma segura
            typeWriterEffect(titleEl, "[ DIRETÓRIO PRINCIPAL ]", 30, function() {
                typeWriterEffect(subtitleEl, "Insira um ID no comando em baixo para ler um ficheiro de texto:", 15, function() {
                    document.getElementById('directory-table').style.display = 'table';
                    document.getElementById('cmd-line').style.display = 'flex';
                    document.getElementById('terminal-input').focus();
                });
            });
        }

        const ficheiros = {
